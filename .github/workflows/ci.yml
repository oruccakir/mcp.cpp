name: CI

on:
  push:
    branches: [main, 'feat/**']
  pull_request:

jobs:
  build-and-test:
    name: ${{ matrix.os }} / ${{ matrix.compiler }} / ${{ matrix.build_type }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        compiler: [gcc, clang]
        build_type: [Debug, Release]
        include:
          - os: macos-latest
            compiler: clang
            build_type: Debug
          - os: macos-latest
            compiler: clang
            build_type: Release
          - os: windows-latest
            compiler: msvc
            build_type: Debug
          - os: windows-latest
            compiler: msvc
            build_type: Release
    steps:
      - uses: actions/checkout@v4

      - name: Configure (Unix)
        if: matrix.compiler != 'msvc'
        env:
          CC: ${{ matrix.compiler == 'gcc' && 'gcc' || 'clang' }}
          CXX: ${{ matrix.compiler == 'gcc' && 'g++' || 'clang++' }}
        run: >
          cmake -B build
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -DMCP_BUILD_TESTS=ON
          -DMCP_WERROR=ON
          -DMCP_ENABLE_LOGGING=${{ matrix.compiler == 'gcc' && matrix.build_type == 'Debug' && 'ON' || 'OFF' }}

      - name: Configure (MSVC)
        if: matrix.compiler == 'msvc'
        run: >
          cmake -B build
          -DMCP_BUILD_TESTS=ON
          -DMCP_WERROR=ON

      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }} -j

      - name: Test
        run: ctest --test-dir build -C ${{ matrix.build_type }} --output-on-failure

  thread-sanitizer:
    name: thread sanitizer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # New kernels' ASLR entropy (mmap_rnd_bits=32) breaks current TSan
      # runtimes ("unexpected memory mapping").
      - name: Lower ASLR entropy for TSan
        run: sudo sysctl -w vm.mmap_rnd_bits=28

      - name: Configure
        env:
          CC: clang
          CXX: clang++
        run: >
          cmake -B build -DCMAKE_BUILD_TYPE=Debug
          -DMCP_BUILD_TESTS=ON -DMCP_BUILD_EXAMPLES=ON
          -DCMAKE_CXX_FLAGS="-fsanitize=thread -g -O1"
          -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=thread"

      - name: Build
        run: cmake --build build -j

      - name: Test under TSan
        env:
          TSAN_OPTIONS: halt_on_error=1
        run: ctest --test-dir build --output-on-failure

  install-consumer:
    name: install & consume
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and install the SDK
        run: >
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          -DMCP_BUILD_TESTS=OFF -DMCP_BUILD_EXAMPLES=OFF
          && cmake --build build -j
          && cmake --install build --prefix "$PWD/prefix"

      - name: Build and run a find_package(mcp) consumer
        run: >
          cmake -B consumer-build -S tests/consumer
          -DCMAKE_PREFIX_PATH="$PWD/prefix"
          && cmake --build consumer-build -j
          && ./consumer-build/consumer
